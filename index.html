<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pikmin Bloom S2 Cell Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #map { width: 100%; height: 100%; }

  /* Top bar */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(0,0,0,0.85); color: #fff; padding: 8px 12px;
    display: flex; align-items: center; gap: 10px; backdrop-filter: blur(8px);
  }
  .top-bar h1 { font-size: 14px; white-space: nowrap; }
  .top-bar .cell-count { font-size: 11px; color: #aaa; margin-left: auto; white-space: nowrap; }

  /* Level control */
  .level-control {
    position: absolute; top: 44px; left: 0; right: 0; z-index: 1000;
    background: rgba(0,0,0,0.8); padding: 6px 12px; backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 8px;
  }
  .level-control .level-text { color: #fff; font-size: 13px; font-weight: 600; min-width: 60px; }
  .level-control .level-desc { color: #aaa; font-size: 11px; min-width: 80px; }
  .level-control input[type=range] { flex: 1; accent-color: #3498db; }
  .quick-levels { display: flex; gap: 4px; }
  .level-btn {
    background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 3px 8px;
    border-radius: 4px; font-size: 11px; cursor: pointer;
  }
  .level-btn:hover { background: rgba(255,255,255,0.3); }

  /* GPS button */
  .gps-btn {
    position: absolute; bottom: 100px; right: 10px; z-index: 1000;
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .gps-btn.active { background: #00e5ff; color: #fff; }

  /* Info panel */
  .info-panel {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(0,0,0,0.9); color: #fff; padding: 16px;
    transform: translateY(100%); transition: transform 0.2s ease;
    backdrop-filter: blur(8px); border-radius: 12px 12px 0 0;
    max-height: 40vh; overflow-y: auto;
  }
  .info-panel.visible { transform: translateY(0); }
  .info-panel .close-btn {
    position: absolute; top: 8px; right: 12px; background: none; border: none;
    color: #aaa; font-size: 20px; cursor: pointer;
  }
  .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .info-label { color: #aaa; font-size: 12px; }
  .info-value { font-size: 12px; font-family: monospace; text-align: right; word-break: break-all; max-width: 60%; }
  .info-value.clickable { cursor: pointer; text-decoration: underline dotted; }

  /* Responsive: hide quick levels on very small screens */
  @media (max-width: 480px) {
    .quick-levels { display: none; }
    .top-bar h1 { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>🌱 Pikmin S2 Map</h1>
  <span class="cell-count" id="cell-count">—</span>
</div>

<div class="level-control">
  <span class="level-text" id="level-display">Level 17</span>
  <input type="range" id="level-slider" min="12" max="20" value="17" step="1">
  <span class="level-desc" id="level-info">Pikmin (~150m)</span>
  <div class="quick-levels">
    <button class="level-btn" data-level="15">15</button>
    <button class="level-btn" data-level="17">17</button>
    <button class="level-btn" data-level="20">20</button>
  </div>
</div>

<div id="map"></div>

<button class="gps-btn" id="gps-btn" title="GPS Location">📍</button>

<div class="info-panel" id="info-panel">
  <button class="close-btn" id="info-close">✕</button>
  <div id="info-content"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="s2.js"></script>
<script src="app.js"></script>
</body>
</html>
